<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Gabarito para Capas de Livros</title>
    <meta name="description"
        content="Gere gabaritos precisos para capas de livros com cálculo automático de lombada, margens de segurança e sangria.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <style>
        .input-error {
            border: 2px solid #dc3545 !important;
            outline: none !important;
            background-color: #fff8f8;
        }
        .error-message {
            display: none;
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 5px;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="app-container" style="padding-top: 10px;">
        <main class="main-content">
            <aside class="sidebar">
                <form id="config-form" class="panel">
                    <div class="form-group">
                        <label for="book-width">Largura do livro fechado em (cm)</label>
                        <input type="number" id="book-width" value="14" step="0.1" min="5" required>
                    </div>
                    <div class="form-group">
                        <label for="book-height">Altura do livro fechado em (cm)</label>
                        <input type="number" id="book-height" value="21" step="0.1" min="5" required>
                    </div>
                    <div class="form-group">
                        <label for="paper-type">Papel do Miolo</label>
                        <select id="paper-type" required>
                            <option value="0.09">Offset 75 (aprox. 0.09mm)</option>
                            <option value="0.11">Offset 90 (aprox. 0.11mm)</option>
                            <option value="0.15">Offset 120 (aprox. 0.15mm)</option>
                            <option value="0.13">Off White (Creme) 80 (aprox. 0.13mm)</option>
                            <option value="0.08">Couche Fosco 90 (aprox. 0.08mm)</option>
                            <option value="0.08">Couche Brilho 90 (aprox. 0.08mm)</option>
                            <option value="0.11">Couche Fosco 120 (aprox. 0.11mm)</option>
                            <option value="0.11">Couche Brilho 120 (aprox. 0.11mm)</option>
                            <option value="0.14">Couche Fosco 150 (aprox. 0.14mm)</option>
                            <option value="0.14">Couche Brilho 150 (aprox. 0.14mm)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="page-count">Quantidade de Páginas</label>
                        <input type="number" id="page-count" value="100" min="20" step="2" required>
                    </div>

                    <div class="form-group checkbox-group">
                        <input type="checkbox" id="has-flap" checked>
                        <label for="has-flap">Incluir Orelhas</label>
                    </div>

                    <div class="form-group" id="flap-size-group">
                        <label for="flap-size">Tamanho da Orelha (cm) - Min 5cm / Max 8cm</label>
                        <input type="number" id="flap-size" value="6" step="0.1" min="5" max="8">
                        <span id="flap-error" class="error-message"></span>
                    </div>
                </form>

                <div class="action-panel panel">
                    <div class="dimension-summary">
                        <h3>Dimensões Totais</h3>
                        <p>Lombada: <span id="spine-width-display">0.00</span> mm</p>
                        <p>Largura Total: <span id="total-width-display">0.00</span> mm</p>
                        <p>Altura Total: <span id="total-height-display">0.00</span> mm</p>
                        <small>A largura e altura totais incluem 3mm de sangria em cada extremidade.</small>
                    </div>
                    <button id="download-pdf" class="btn-primary">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Baixar PDF
                    </button>
                </div>
            </aside>

            <section class="preview-container">
                <div class="preview-controls panel">
                    <label for="zoom-slider">Zoom da Visualização:</label>
                    <input type="range" id="zoom-slider" min="0.5" max="2" step="0.1" value="1">
                    <span id="zoom-value">100%</span>
                </div>
                <div class="preview-area" id="preview-area">
                    <div class="canvas-wrapper">
                        <div id="cover-canvas" class="cover-canvas">
                            </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
